name: nb

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g., 0.1.0)'
        required: true
        default: '0.2.0'
      build_android:
        description: 'Build Android (all ABIs)'
        type: boolean
        default: true
      build_linux:
        description: 'Build Linux'
        type: boolean
        default: false
      build_macos:
        description: 'Build macOS'
        type: boolean
        default: false
      build_windows:
        description: 'Build Windows'
        type: boolean
        default: false
      build_ios:
        description: 'Build iOS'
        type: boolean
        default: false

env:
  LLAMA_CPP_DIR: packages/llm_llamacpp/llamacpp
  ANDROID_NDK_VERSION: 26.3.11579264
  ANDROID_MIN_SDK: 24

jobs:
  # ============================================
  # Get llama.cpp commit hash (for consistency)
  # ============================================
  get-llama-commit:
    runs-on: ubuntu-latest
    outputs:
      commit_hash: ${{ steps.get-commit.outputs.commit_hash }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Get llama.cpp commit
        id: get-commit
        run: |
          cd ${{ env.LLAMA_CPP_DIR }}
          COMMIT_HASH=$(git rev-parse HEAD)
          echo "commit_hash=$COMMIT_HASH" >> $GITHUB_OUTPUT
          echo "llama.cpp commit: $COMMIT_HASH"

  # ============================================
  # Android builds (using matrix for all ABIs)
  # ============================================
  build-android:
    needs: get-llama-commit
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.build_android)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        abi: [arm64-v8a, armeabi-v7a, x86_64, x86]
        include:
          - abi: arm64-v8a
            cmake_extra: "-DGGML_CPU_ALL_VARIANTS=ON -DGGML_CPU_KLEIDIAI=ON"
          - abi: armeabi-v7a
            cmake_extra: ""
          - abi: x86_64
            cmake_extra: "-DGGML_CPU_ALL_VARIANTS=ON"
          - abi: x86
            cmake_extra: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Verify llama.cpp commit
        run: |
          cd ${{ env.LLAMA_CPP_DIR }}
          CURRENT_COMMIT=$(git rev-parse HEAD)
          EXPECTED_COMMIT="${{ needs.get-llama-commit.outputs.commit_hash }}"
          if [ "$CURRENT_COMMIT" != "$EXPECTED_COMMIT" ]; then
            echo "❌ Commit mismatch! Expected: $EXPECTED_COMMIT, Got: $CURRENT_COMMIT"
            exit 1
          fi
          echo "✅ Using llama.cpp commit: $CURRENT_COMMIT"

      - name: Setup Vulkan SDK
        uses: jakoch/install-vulkan-sdk-action@v1
        with:
          vulkan_version: latest
          cache: true

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r${{ env.ANDROID_NDK_VERSION }}
          link-to-sdk: true

      - name: Cache OpenCL headers
        id: cache-opencl
        uses: actions/cache@v4
        with:
          path: OpenCL-Headers
          key: opencl-headers-v2024.05.08

      - name: Install OpenCL headers
        if: steps.cache-opencl.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch v2024.05.08 https://github.com/KhronosGroup/OpenCL-Headers.git

      - name: Setup OpenCL headers
        run: |
          sudo cp -r OpenCL-Headers/CL /usr/local/include/

      - name: Cache build
        uses: actions/cache@v4
        with:
          path: |
            build-android-${{ matrix.abi }}/CMakeCache.txt
            build-android-${{ matrix.abi }}/CMakeFiles
          key: android-${{ matrix.abi }}-${{ needs.get-llama-commit.outputs.commit_hash }}

      - name: Build for Android ${{ matrix.abi }}
        run: |
          mkdir -p build-android-${{ matrix.abi }}
          cd build-android-${{ matrix.abi }}
          
          cmake ../${{ env.LLAMA_CPP_DIR }} \
            -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=${{ matrix.abi }} \
            -DANDROID_PLATFORM=android-${{ env.ANDROID_MIN_SDK }} \
            -DANDROID_FORCE_ARM_BUILD=ON \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=ON \
            -DLLAMA_BUILD_TESTS=OFF \
            -DLLAMA_BUILD_EXAMPLES=OFF \
            -DLLAMA_BUILD_SERVER=OFF \
            -DLLAMA_BUILD_TOOLS=OFF \
            -DLLAMA_CURL=OFF \
            -DGGML_NATIVE=OFF \
            -DGGML_LLAMAFILE=OFF \
            -DGGML_BACKEND_DL=ON \
            -DGGML_OPENMP=ON \
            -DGGML_OPENCL=ON \
            -DGGML_VULKAN=ON \
            -DGGML_VULKAN_CHECK_RESULTS=OFF \
            -DGGML_VULKAN_RUN_TESTS=OFF \
            ${{ matrix.cmake_extra }}
          
          cmake --build . --config Release -j$(nproc)

      - name: Package artifacts
        run: |
          VERSION="${{ github.event.inputs.version || github.ref_name }}"
          VERSION="${VERSION#v}"
          
          ABI_NAME="${{ matrix.abi }}"
          if [ "$ABI_NAME" = "arm64-v8a" ]; then
            ABI_NAME="arm64-v8a"
          elif [ "$ABI_NAME" = "armeabi-v7a" ]; then
            ABI_NAME="armeabi-v7a"
          fi
          
          mkdir -p dist
          find build-android-${{ matrix.abi }} -name "*.so" -exec cp {} dist/ \;
          
          cd dist
          zip -r ../llm_llamacpp-v${VERSION}-android-${ABI_NAME}.zip *.so

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-${{ matrix.abi }}
          path: llm_llamacpp-*.zip
          retention-days: 30

  # ============================================
  # Linux x64 Build (optional)
  # ============================================
  build-linux-x64:
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.build_linux)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build \
            libvulkan-dev vulkan-tools glslc \
            ocl-icd-opencl-dev opencl-headers

      - name: Setup CUDA
        uses: Jimver/cuda-toolkit@v0.2.19
        with:
          cuda: '12.4.1'
          method: 'network'
          sub-packages: '["nvcc", "cudart"]'

      - name: Build llama.cpp
        run: |
          mkdir -p build-linux-x64
          cd build-linux-x64
          
          cmake ../${{ env.LLAMA_CPP_DIR }} \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=ON \
            -DLLAMA_BUILD_TESTS=OFF \
            -DLLAMA_BUILD_EXAMPLES=OFF \
            -DLLAMA_BUILD_SERVER=OFF \
            -DLLAMA_BUILD_TOOLS=OFF \
            -DGGML_CUDA=ON \
            -DGGML_VULKAN=ON \
            -DGGML_OPENCL=ON \
            -DGGML_OPENMP=ON \
            -DGGML_NATIVE=ON
          
          cmake --build . --config Release -j$(nproc)

      - name: Package artifacts
        run: |
          VERSION="${{ github.event.inputs.version || github.ref_name }}"
          VERSION="${VERSION#v}"
          
          mkdir -p dist
          find build-linux-x64 -name "*.so" -exec cp {} dist/ \; 2>/dev/null || true
          
          cd dist
          zip -r ../llm_llamacpp-v${VERSION}-linux-x64.zip *.so

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-x64
          path: llm_llamacpp-*.zip
          retention-days: 30

  # ============================================
  # macOS Builds (optional, using matrix)
  # ============================================
  build-macos:
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.build_macos)
    runs-on: macos-14
    strategy:
      matrix:
        arch: [arm64, x86_64]
        include:
          - arch: arm64
            cmake_extra: "-DGGML_METAL=ON -DGGML_METAL_EMBED_LIBRARY=ON"
          - arch: x86_64
            cmake_extra: "-DGGML_METAL=OFF"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          brew install cmake ninja libomp

      - name: Build for macOS ${{ matrix.arch }}
        run: |
          mkdir -p build-macos-${{ matrix.arch }}
          cd build-macos-${{ matrix.arch }}
          
          cmake ../${{ env.LLAMA_CPP_DIR }} \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES=${{ matrix.arch }} \
            -DBUILD_SHARED_LIBS=ON \
            -DLLAMA_BUILD_TESTS=OFF \
            -DLLAMA_BUILD_EXAMPLES=OFF \
            -DLLAMA_BUILD_SERVER=OFF \
            -DLLAMA_BUILD_TOOLS=OFF \
            -DLLAMA_CURL=OFF \
            -DGGML_OPENMP=ON \
            -DGGML_ACCELERATE=ON \
            ${{ matrix.cmake_extra }}
          
          cmake --build . --config Release -j$(sysctl -n hw.ncpu)

      - name: Package artifacts
        run: |
          VERSION="${{ github.event.inputs.version || github.ref_name }}"
          VERSION="${VERSION#v}"
          
          mkdir -p dist
          find build-macos-${{ matrix.arch }} -name "*.dylib" -exec cp {} dist/ \;
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            find build-macos-${{ matrix.arch }} -name "*.metallib" -exec cp {} dist/ \; 2>/dev/null || true
          fi
          
          cd dist
          zip -r ../llm_llamacpp-v${VERSION}-macos-${{ matrix.arch }}.zip *

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}
          path: llm_llamacpp-*.zip
          retention-days: 30

  # ============================================
  # Windows x64 Build (optional)
  # ============================================
  build-windows-x64:
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.build_windows)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Vulkan SDK
        uses: jakoch/install-vulkan-sdk-action@v1
        with:
          vulkan_version: latest
          cache: true

      - name: Build llama.cpp
        shell: pwsh
        run: |
          mkdir build-windows-x64
          cd build-windows-x64
          
          cmake ..\${{ env.LLAMA_CPP_DIR }} `
            -DCMAKE_BUILD_TYPE=Release `
            -DBUILD_SHARED_LIBS=ON `
            -DLLAMA_BUILD_TESTS=OFF `
            -DLLAMA_BUILD_EXAMPLES=OFF `
            -DLLAMA_BUILD_SERVER=OFF `
            -DLLAMA_BUILD_TOOLS=OFF `
            -DGGML_CUDA=OFF `
            -DGGML_VULKAN=ON `
            -DGGML_OPENMP=ON
          
          cmake --build . --config Release -j $env:NUMBER_OF_PROCESSORS

      - name: Package artifacts
        shell: pwsh
        run: |
          $version = "${{ github.event.inputs.version || github.ref_name }}"
          $version = $version -replace '^v', ''
          
          New-Item -ItemType Directory -Force -Path dist
          Get-ChildItem -Path build-windows-x64 -Recurse -Filter "*.dll" | Copy-Item -Destination dist -Force
          
          Compress-Archive -Path dist\* -DestinationPath "llm_llamacpp-v$version-windows-x64.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: llm_llamacpp-*.zip
          retention-days: 30

  # ============================================
  # iOS Build (optional)
  # ============================================
  build-ios:
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.build_ios)
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          brew install cmake ninja

      - name: Build for iOS
        run: |
          mkdir -p build-ios-arm64
          cd build-ios-arm64
          
          cmake ../${{ env.LLAMA_CPP_DIR }} \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=15.0 \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DBUILD_SHARED_LIBS=OFF \
            -DLLAMA_BUILD_TESTS=OFF \
            -DLLAMA_BUILD_EXAMPLES=OFF \
            -DLLAMA_BUILD_SERVER=OFF \
            -DLLAMA_BUILD_TOOLS=OFF \
            -DGGML_METAL=ON \
            -DGGML_METAL_EMBED_LIBRARY=ON
          
          cmake --build . --config Release -j$(sysctl -n hw.ncpu)

      - name: Package artifacts
        run: |
          VERSION="${{ github.event.inputs.version || github.ref_name }}"
          VERSION="${VERSION#v}"
          
          mkdir -p dist
          find build-ios-arm64 -name "*.a" -exec cp {} dist/ \;
          find build-ios-arm64 -name "*.metallib" -exec cp {} dist/ \; 2>/dev/null || true
          
          cd dist
          zip -r ../llm_llamacpp-v${VERSION}-ios-arm64.zip *

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-arm64
          path: llm_llamacpp-*.zip
          retention-days: 30

  # ============================================
  # Create Release
  # ============================================
  release:
    needs:
      - get-llama-commit
      - build-android
      - build-linux-x64
      - build-macos
      - build-windows-x64
      - build-ios
    if: |
      always() &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false

      - name: Display artifacts
        run: |
          echo "Downloaded artifacts:"
          find artifacts -type f -name "*.zip" | sort

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION="v${{ github.event.inputs.version }}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Using version: ${VERSION}"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Release ${{ steps.version.outputs.version }}
          files: artifacts/**/*.zip
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
