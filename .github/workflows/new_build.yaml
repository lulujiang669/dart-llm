name: Build and Release llm_llamacpp (Android only)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g., 0.1.0)'
        required: true
        default: '0.1.0'
      skip_android:
        description: 'Skip Android builds'
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  LLAMA_CPP_DIR: packages/llm_llamacpp/llamacpp
  CCACHE_DIR: ${{ github.workspace }}/.ccache
  NDK_VERSION: 26.3.11579264

jobs:
  build-android:
    if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && !inputs.skip_android) }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        abi: [arm64-v8a, armeabi-v7a, x86_64]
      max-parallel: 3
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android/sdk/ndk/{23,24,25}* 2>/dev/null || true
          df -h

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1
        with:
          key: android-${{ matrix.abi }}
          max-size: 2G
          restore-keys: android-

      - name: Update llama.cpp
        id: llama-update
        run: |
          cd ${{ env.LLAMA_CPP_DIR }}
          git fetch origin master --tags
          git checkout master
          git pull origin master
          git submodule update --init --recursive
          echo "commit=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Setup Vulkan SDK
        uses: jakoch/install-vulkan-sdk-action@v1
        with:
          vulkan_version: latest
          cache: true

      - name: Setup Android NDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: 11076708

      - name: Install NDK
        run: |
          sdkmanager --install "ndk;${{ env.NDK_VERSION }}"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/${{ env.NDK_VERSION }}" >> $GITHUB_ENV

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends cmake ninja-build

      - name: Configure CMake
        run: |
          cmake -S ${{ env.LLAMA_CPP_DIR }} -B build-android-${{ matrix.abi }} \
            -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=${{ matrix.abi }} \
            -DANDROID_PLATFORM=android-24 \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=ON \
            -DLLAMA_BUILD_TESTS=OFF \
            -DLLAMA_BUILD_EXAMPLES=OFF \
            -DLLAMA_BUILD_SERVER=OFF \
            -DLLAMA_BUILD_TOOLS=OFF \
            -DLLAMA_CURL=OFF \
            -DGGML_NATIVE=OFF \
            -DGGML_LLAMAFILE=OFF \
            -DGGML_BACKEND_DL=ON \
            -DGGML_CPU_ALL_VARIANTS=ON \
            -DGGML_CPU_KLEIDIAI=ON \
            -DGGML_OPENMP=ON \
            -DGGML_OPENCL=OFF \
            -DGGML_VULKAN=ON \
            -DGGML_VULKAN_CHECK_RESULTS=OFF \
            -DGGML_VULKAN_RUN_TESTS=OFF \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Build
        run: cmake --build build-android-${{ matrix.abi }} --config Release -j$(nproc)

      - name: Package artifacts
        run: |
          VERSION="${{ github.event.inputs.version || github.ref_name }}"
          VERSION="${VERSION#v}"
          
          case ${{ matrix.abi }} in
            arm64-v8a)    PLATFORM="android-arm64-v8a" ;;
            armeabi-v7a)  PLATFORM="android-armeabi-v7a" ;;
            x86_64)       PLATFORM="android-x86_64" ;;
          esac
          
          mkdir -p dist
          find build-android-${{ matrix.abi }} -name "*.so" -exec cp {} dist/ \;
          cd dist && zip -r ../llm_llamacpp-v${VERSION}-${PLATFORM}.zip *.so

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-${{ matrix.abi }}
          path: llm_llamacpp-*.zip
          if-no-files-found: error
          retention-days: 7

  release:
    needs: build-android
    runs-on: ubuntu-latest
    if: ${{ always() && needs.build-android.result == 'success' }}
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION="v${{ github.event.inputs.version }}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "::notice::Building version: ${VERSION}"

      - name: Check and create tag
        if: ${{ github.event_name == 'workflow_dispatch' }}
        id: tag
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if git ls-remote --tags origin "$VERSION" 2>/dev/null | grep -q .; then
            echo "::warning::Tag $VERSION already exists, skipping release creation"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag "$VERSION"
            git push origin "$VERSION"
            echo "Created tag: $VERSION"
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: List artifacts
        run: find artifacts -type f -name "*.zip" | sort

      - name: Create Release
        if: ${{ steps.tag.outputs.skip != 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          files: artifacts/**/*.zip
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
