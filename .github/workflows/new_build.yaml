name: Build and Release llm_llamacpp

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g., 0.1.0)'
        required: true
        default: '0.1.0'
      build_android:
        description: 'Build Android (all ABIs)'
        type: boolean
        default: true
      build_linux:
        description: 'Build Linux'
        type: boolean
        default: false
      build_macos:
        description: 'Build macOS'
        type: boolean
        default: false
      build_windows:
        description: 'Build Windows'
        type: boolean
        default: false
      build_ios:
        description: 'Build iOS'
        type: boolean
        default: false

env:
  LLAMA_CPP_DIR: packages/llm_llamacpp/llamacpp
  ANDROID_NDK_VERSION: r26d  # 对应 NDK 26.3.11579264
  ANDROID_MIN_SDK: 24
  CMAKE_VERSION: 3.28.3

jobs:
  # ============================================
  # Get latest llama.cpp commit hash
  # ============================================
  get-llama-commit:
    runs-on: ubuntu-latest
    outputs:
      commit_hash: ${{ steps.get-commit.outputs.commit_hash }}
      commit_date: ${{ steps.get-commit.outputs.commit_date }}
      commit_message: ${{ steps.get-commit.outputs.commit_message }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Update llama.cpp to latest master and get commit info
        id: get-commit
        run: |
          cd ${{ env.LLAMA_CPP_DIR }}
          
          # 更新到最新 master
          git fetch origin master --depth=1
          git checkout -f origin/master
          git submodule update --init --recursive --depth=1
          
          # 获取提交信息
          COMMIT_HASH=$(git rev-parse HEAD)
          COMMIT_DATE=$(git log -1 --format=%cd --date=short)
          COMMIT_MSG=$(git log -1 --format=%s)
          
          echo "commit_hash=$COMMIT_HASH" >> $GITHUB_OUTPUT
          echo "commit_date=$COMMIT_DATE" >> $GITHUB_OUTPUT
          echo "commit_message=$COMMIT_MSG" >> $GITHUB_OUTPUT
          
          echo "✅ Updated llama.cpp to:"
          echo "   Commit: $COMMIT_HASH"
          echo "   Date: $COMMIT_DATE"
          echo "   Message: $COMMIT_MSG"

  # ============================================
  # Android builds - Fully optimized for all chips
  # ============================================
  build-android:
    needs: get-llama-commit
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.build_android)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false  # 一个 ABI 失败不影响其他 ABI
      matrix:
        abi: [arm64-v8a, armeabi-v7a, x86_64, x86]
        include:
          - abi: arm64-v8a
            cmake_extra: >
              -DGGML_CPU_ALL_VARIANTS=ON
              -DGGML_CPU_KLEIDIAI=ON
              -DGGML_OPENCL_USE_ADRENO_KERNELS=ON
            description: "ARMv8 64-bit with full CPU variants + Adreno OpenCL"
          
          - abi: armeabi-v7a
            cmake_extra: >
              -DGGML_OPENCL_USE_ADRENO_KERNELS=ON
              -DARM_FEATURES=ON
            description: "ARMv7 with NEON + Adreno OpenCL"
          
          - abi: x86_64
            cmake_extra: >
              -DGGML_CPU_ALL_VARIANTS=ON
              -DGGML_OPENMP=ON
            description: "x86_64 with SSE4/AVX variants"
          
          - abi: x86
            cmake_extra: >
              -DGGML_OPENMP=ON
            description: "x86 with SSE3 support"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Verify and sync llama.cpp commit
        run: |
          cd ${{ env.LLAMA_CPP_DIR }}
          git fetch origin master --depth=1
          git checkout -f ${{ needs.get-llama-commit.outputs.commit_hash }}
          git submodule update --init --recursive --depth=1
          echo "✅ Using llama.cpp commit: $(git rev-parse HEAD)"
          echo "   Date: ${{ needs.get-llama-commit.outputs.commit_date }}"
          echo "   Message: ${{ needs.get-llama-commit.outputs.commit_message }}"

      - name: Setup Vulkan SDK
        uses: jakoch/install-vulkan-sdk-action@v1
        with:
          vulkan_version: latest
          cache: true

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: ${{ env.ANDROID_NDK_VERSION }}
          link-to-sdk: true

      - name: Setup CMake
        uses: lukka/get-cmake@latest
        with:
          cmakeVersion: ${{ env.CMAKE_VERSION }}

      - name: Cache OpenCL headers
        id: cache-opencl
        uses: actions/cache@v4
        with:
          path: OpenCL-Headers
          key: opencl-headers-2024.05.08

      - name: Install OpenCL headers
        if: steps.cache-opencl.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch v2024.05.08 https://github.com/KhronosGroup/OpenCL-Headers.git

      - name: Setup OpenCL headers
        run: |
          sudo mkdir -p /usr/local/include
          sudo cp -r OpenCL-Headers/CL /usr/local/include/

      - name: Cache build
        uses: actions/cache@v4
        with:
          path: |
            build-android-${{ matrix.abi }}
            ~/.ccache
          key: android-${{ matrix.abi }}-${{ needs.get-llama-commit.outputs.commit_hash }}-${{ github.run_id }}
          restore-keys: |
            android-${{ matrix.abi }}-${{ needs.get-llama-commit.outputs.commit_hash }}-
            android-${{ matrix.abi }}-

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: android-${{ matrix.abi }}-${{ needs.get-llama-commit.outputs.commit_hash }}
          max-size: 2G

      - name: Build Android ${{ matrix.abi }} with all accelerations
        run: |
          mkdir -p build-android-${{ matrix.abi }}
          cd build-android-${{ matrix.abi }}
          
          echo "🔧 Building for ${{ matrix.abi }} with optimizations: ${{ matrix.description }}"
          
          # 根据 ABI 设置额外的优化参数
          EXTRA_FLAGS="${{ matrix.cmake_extra }}"
          
          cmake ../${{ env.LLAMA_CPP_DIR }} \
            -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=${{ matrix.abi }} \
            -DANDROID_PLATFORM=android-${{ env.ANDROID_MIN_SDK }} \
            -DANDROID_FORCE_ARM_BUILD=ON \
            -DANDROID_STL=c++_shared \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DBUILD_SHARED_LIBS=ON \
            -DLLAMA_BUILD_TESTS=OFF \
            -DLLAMA_BUILD_EXAMPLES=OFF \
            -DLLAMA_BUILD_SERVER=OFF \
            -DLLAMA_BUILD_TOOLS=OFF \
            -DLLAMA_CURL=OFF \
            -DGGML_NATIVE=OFF \
            -DGGML_LLAMAFILE=OFF \
            -DGGML_BACKEND_DL=ON \
            -DGGML_OPENMP=ON \
            -DGGML_OPENCL=ON \
            -DGGML_VULKAN=ON \
            -DGGML_VULKAN_CHECK_RESULTS=OFF \
            -DGGML_VULKAN_RUN_TESTS=OFF \
            ${EXTRA_FLAGS}
          
          # 编译并显示详细日志
          cmake --build . --config Release -j$(nproc) --verbose

      - name: Verify shared libraries
        run: |
          echo "📦 Built libraries for ${{ matrix.abi }}:"
          find build-android-${{ matrix.abi }} -name "*.so" -type f | while read lib; do
            echo "  - $(basename $lib) ($(du -h $lib | cut -f1))"
            if command -v file &> /dev/null; then
              file $lib | sed 's/^/    /'
            fi
          done

      - name: Package artifacts
        run: |
          VERSION="${{ github.event.inputs.version || github.ref_name }}"
          VERSION="${VERSION#v}"
          
          # 生成带 commit hash 的版本号（便于追踪）
          COMMIT_HASH="${{ needs.get-llama-commit.outputs.commit_hash }}"
          SHORT_HASH=$(echo $COMMIT_HASH | cut -c1-8)
          FULL_VERSION="${VERSION}-${SHORT_HASH}"
          
          mkdir -p dist
          
          # 复制所有 .so 文件
          find build-android-${{ matrix.abi }} -name "*.so" -exec cp {} dist/ \;
          
          # 创建包含元数据的 info 文件
          cat > dist/build-info.txt << EOF
          Build Information
          ================
          Version: $VERSION
          Commit: $COMMIT_HASH
          Commit Date: ${{ needs.get-llama-commit.outputs.commit_date }}
          Commit Message: ${{ needs.get-llama-commit.outputs.commit_message }}
          ABI: ${{ matrix.abi }}
          Optimizations: ${{ matrix.description }}
          Build Date: $(date -u +"%Y-%m-%d %H:%M:%S UTC")
          EOF
          
          cd dist
          zip -r ../llm_llamacpp-${FULL_VERSION}-android-${{ matrix.abi }}.zip *

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-${{ matrix.abi }}
          path: llm_llamacpp-*.zip
          retention-days: 90
          if-no-files-found: error

  # ============================================
  # Create Release (only when all Android builds succeed)
  # ============================================
  release:
    needs:
      - get-llama-commit
      - build-android
    if: |
      success() && 
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all Android artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false

      - name: Display artifacts
        run: |
          echo "📦 Prepared for release:"
          find artifacts -type f -name "*.zip" | sort | while read file; do
            echo "  - $(basename $file) ($(du -h $file | cut -f1))"
          done

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION="v${{ github.event.inputs.version }}"
          fi
          
          # 获取 commit hash
          COMMIT_HASH="${{ needs.get-llama-commit.outputs.commit_hash }}"
          SHORT_HASH=$(echo $COMMIT_HASH | cut -c1-8)
          
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "short_hash=${SHORT_HASH}" >> $GITHUB_OUTPUT
          echo "commit_hash=${COMMIT_HASH}" >> $GITHUB_OUTPUT
          echo "commit_date=${{ needs.get-llama-commit.outputs.commit_date }}" >> $GITHUB_OUTPUT
          
          echo "🚀 Creating release: ${VERSION} (based on llama.cpp ${SHORT_HASH})"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Release ${{ steps.version.outputs.version }}
          body: |
            ## 🚀 llm_llamacpp Android Library Release
            
            ### 📦 Build Information
            - **Version**: ${{ steps.version.outputs.version }}
            - **llama.cpp Commit**: [`${{ steps.version.outputs.short_hash }}`](https://github.com/ggerganov/llama.cpp/commit/${{ steps.version.outputs.commit_hash }})
            - **Commit Date**: ${{ steps.version.outputs.commit_date }}
            - **Build Date**: $(date -u +"%Y-%m-%d %H:%M:%S UTC")
            
            ### 📱 Supported ABIs
            - **arm64-v8a**: Full CPU variants + Adreno OpenCL + KleidiAI
            - **armeabi-v7a**: NEON + Adreno OpenCL
            - **x86_64**: SSE4/AVX variants
            - **x86**: SSE3 support
            
            ### ⚡ Accelerations Enabled
            - ✅ OpenCL (with Adreno kernels)
            - ✅ Vulkan
            - ✅ OpenMP (CPU parallel)
            - ✅ CPU dynamic dispatch (all variants)
            - ✅ KleidiAI (ARM v8.2+/v9)
            
            ### 📥 Downloads
            Each zip file contains:
            - `libllama.so` - Main shared library
            - `build-info.txt` - Detailed build metadata
          files: artifacts/**/*.zip
          generate_release_notes: false
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============================================
  # Notify on failure
  # ============================================
  notify-failure:
    needs: [build-android, release]
    if: failure() && github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Send failure notification
        run: |
          echo "❌ Build failed for Android ABIs"
          echo "Check the workflow logs for details"
          # 这里可以添加 Slack/Discord/Email 通知
